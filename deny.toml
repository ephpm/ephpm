[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # rustls-pemfile unmaintained — transitive dep, awaiting upstream migration
    "RUSTSEC-2025-0134",
    # rustls-webpki vulns — pinned by opensrv-mysql (litewire transitive dep)
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # time crate DoS via RFC 2822 parsing — transitive dep, no user input path
    "RUSTSEC-2026-0009",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CDLA-Permissive-2.0",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["MIT"], name = "xtask", version = "*" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/ephpm/litewire.git"]
