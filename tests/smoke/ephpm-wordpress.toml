# ephpm config for WordPress smoke test.
#
# WordPress uses pretty permalinks via fallback rewrite to index.php,
# pdo_mysql connecting to litewire's MySQL frontend for SQLite storage.

[server]
listen = "0.0.0.0:8080"
document_root = "/var/www/html"
index_files = ["index.php", "index.html"]
fallback = ["$uri", "$uri/", "/index.php?$query_string"]

[server.request]
max_body_size = 64

[server.static]
cache_control = "no-cache"

[server.security]
blocked_paths = [".git/*", ".env"]

[php]
max_execution_time = 120
memory_limit = "256M"
ini_overrides = [
    ["display_errors", "On"],
    ["error_reporting", "E_ALL"],
    ["upload_max_filesize", "64M"],
    ["post_max_size", "64M"],
]

[db.sqlite]
path = "/tmp/wordpress.db"

[db.sqlite.proxy]
mysql_listen = "127.0.0.1:3306"
