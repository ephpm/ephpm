[server]
listen = "0.0.0.0:8080"
document_root = "/var/www/html"
index_files = ["index.php", "index.html"]
fallback = ["$uri", "$uri/", "=404"]

[server.request]
max_body_size = 1024

[server.static]
cache_control = "public, max-age=3600"

[server.metrics]
enabled = true

[server.security]
blocked_paths = ["vendor/*"]

[php]
max_execution_time = 30
memory_limit = "128M"
ini_overrides = [
    ["display_errors", "On"],
    ["error_reporting", "E_ALL"],
]

[db.sqlite]
path = "/tmp/ephpm-test.db"

[db.sqlite.proxy]
mysql_listen = "127.0.0.1:3306"
