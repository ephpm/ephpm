[server]
listen = "0.0.0.0:8080"
document_root = "/var/www/html"
sites_dir = "/var/www/sites"
index_files = ["index.php", "index.html"]
fallback = ["$uri", "$uri/", "=404"]

[server.request]
max_body_size = 1024
max_header_size = 4096
trusted_hosts = [
    "ephpm", "localhost", "127.0.0.1",
    # vhost tests
    "nonexistent-site.example.com",
    "lazy-test.preview.ephpm.dev",
    "site-a.preview.ephpm.dev",
    "site-b.preview.ephpm.dev",
    # security P0 tests
    "basedir-a.test",
    "basedir-b.test",
    "shell-test.test",
    "kv-smoke.test",
    "kv-a.test",
    "kv-b.test",
    # evil.example.com is intentionally NOT listed — tests 421 rejection
]

[server.response]
compression_min_size = 1024
headers = [
    ["X-Frame-Options", "DENY"],
    ["X-Content-Type-Options", "nosniff"],
    ["Strict-Transport-Security", "max-age=31536000; includeSubDomains"],
]

[server.static]
cache_control = "public, max-age=3600"

[server.file_cache]
enabled = true

[server.metrics]
enabled = true

[server.security]
blocked_paths = ["vendor/*"]
open_basedir = true
disable_shell_exec = true

[php]
max_execution_time = 30
memory_limit = "128M"
ini_overrides = [
    ["display_errors", "On"],
    ["error_reporting", "E_ALL"],
]

[server.limits]
max_connections = 100
per_ip_rate = 50.0
per_ip_burst = 10

[db.sqlite]
path = "/tmp/ephpm-test.db"

[db.sqlite.proxy]
mysql_listen = "127.0.0.1:3306"
hrana_listen = "0.0.0.0:8081"
postgres_listen = "127.0.0.1:5432"
tds_listen = "127.0.0.1:1433"

[server.timeouts]
header_read = 20
idle = 45

[db.read_write_split]
enabled = true
sticky_duration = "2s"

[kv]
memory_limit = "64MB"
eviction_policy = "allkeys-lru"

[kv.redis_compat]
enabled = true
socket = "/tmp/ephpm-kv.sock"
