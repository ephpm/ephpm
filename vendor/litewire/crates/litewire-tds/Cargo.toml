[package]
name = "litewire-tds"
description = "TDS (SQL Server) wire protocol frontend for litewire"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[dependencies]
litewire-backend = { path = "../litewire-backend" }
litewire-translate = { path = "../litewire-translate" }
bytes = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "2"
