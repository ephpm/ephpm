[package]
name = "litewire-mysql"
description = "MySQL wire protocol frontend for litewire"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[dependencies]
litewire-backend = { path = "../litewire-backend" }
litewire-translate = { path = "../litewire-translate" }
async-trait = "0.1"
opensrv-mysql = "0.7"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "2"
