[package]
name = "litewire-backend"
description = "Backend trait and implementations for litewire"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[dependencies]
async-trait = "0.1"
parking_lot = "0.12"
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "http2"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
base64 = { version = "0.22", optional = true }
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
litewire-hrana = { path = "../litewire-hrana" }
tokio = { version = "1", features = ["full"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["rusqlite"]
rusqlite = ["dep:rusqlite"]
hrana-client = ["dep:reqwest", "dep:serde", "dep:serde_json", "dep:base64"]
