[package]
name = "litewire-hrana"
description = "Hrana HTTP frontend for litewire (sqld-compatible)"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[dependencies]
litewire-backend = { path = "../litewire-backend" }
axum = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "2"
base64 = "0.22"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
