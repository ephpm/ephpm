# Default values for the ephpm chart.
# Config precedence in ePHPm: env (EPHPM_ prefix, "__" nesting separator)
# OVERRIDES the TOML file. This chart ships a base ephpm.toml via ConfigMap
# (server + php) and renders the operational, secret-bearing sections
# (db, kv, cluster, tls, metrics) as env from the typed values below.

replicaCount: 1

image:
  # ePHPm is a runtime: bake your PHP app into an image FROM ephpm/ephpm
  # (app at /var/www/html) and point this at it.
  repository: ephpm/ephpm
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

containerPort: 8080
command: []
args: ["ephpm", "serve", "--config", "/etc/ephpm/ephpm.toml"]

# --- Base config rendered into /etc/ephpm/ephpm.toml (server + php) ----------
# NOTE: [php] has no "mode" field (embedded vs external is compile-time).
config:
  contents: |
    [server]
    listen = "0.0.0.0:8080"
    document_root = "/var/www/html"
    index_files = ["index.php", "index.html"]

    # [server.request]
    # trusted_hosts = ["example.com"]

    [php]
    max_execution_time = 30
    memory_limit = "128M"
    ini_overrides = [
        ["display_errors", "Off"],
        ["error_reporting", "E_ALL"],
    ]
  extraToml: ""

# --- Metrics (served on the HTTP port at metrics.path) -----------------------
metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

# --- Database proxy backends -------------------------------------------------
# Each backend's listener binds 127.0.0.1 (in-pod use by the co-located PHP),
# so these are NOT exposed as Services. Provide the real DB via url, or a
# Secret via existingSecret (key defaults to "url") to avoid plaintext.
db:
  mysql:
    enabled: false
    url: ""
    existingSecret: ""
    secretKey: url
    listen: "127.0.0.1:3306"
    minConnections: 2
    maxConnections: 20
    injectEnv: true            # auto-set DB_HOST/DATABASE_URL for PHP
    resetStrategy: smart
    replicas:
      urls: []
  postgres:
    enabled: false
    url: ""
    existingSecret: ""
    secretKey: url
    listen: "127.0.0.1:5432"
    minConnections: 2
    maxConnections: 20
    injectEnv: true
    resetStrategy: smart
    replicas:
      urls: []
  # SQLite (with optional embedded proxy + clustered sqld). Enabling sqlite
  # forces a StatefulSet so the data file gets a stable PVC.
  sqlite:
    enabled: false
    path: ephpm.db            # stored under the data PVC mount
    proxy:
      mysqlListen: "127.0.0.1:3306"
    sqld:                     # clustered mode only
      httpListen: "127.0.0.1:8081"
      grpcListen: "0.0.0.0:5001"
    replication:              # clustered mode only
      role: auto
      primaryGrpcUrl: ""
    persistence:
      size: 5Gi
      storageClass: ""
  readWriteSplit:
    enabled: false
    strategy: sticky-after-write
    stickyDuration: "2s"
    maxReplicaLag: "500ms"

# --- KV store ----------------------------------------------------------------
kv:
  memoryLimit: "256MB"
  evictionPolicy: allkeys-lru
  # Multi-tenant RESP auth secret (plaintext, or use existingSecret/key).
  secret: ""
  existingSecret: ""
  secretKey: kv-secret
  redisCompat:
    enabled: false
    listen: "127.0.0.1:6379"
    password: ""
    existingSecret: ""
    passwordKey: redis-password

# --- Clustering (StatefulSet + SWIM gossip) ----------------------------------
cluster:
  enabled: false
  replicas: 3
  gossipPort: 7946
  clusterId: ""               # empty -> release fullname
  join: []                    # empty -> derived from headless Service DNS
  secret: ""                  # base64 32-byte key; stored in a Secret
  existingSecret: ""
  secretKey: gossip-secret
  kv:
    replicationFactor: 2
    replicationMode: async
    dataPort: 7947            # KV data-plane TCP port

clusterDomain: cluster.local

# --- In-pod TLS (alternative to ingress termination; default off) ------------
# Manual: provide a TLS Secret (tls.crt/tls.key) via secretName -> mounted and
#   referenced by path. ACME: set acme.domains/email.
tls:
  enabled: false
  mode: manual                # "manual" | "acme"
  secretName: ""              # manual: existing kubernetes.io/tls Secret
  mountPath: /etc/ephpm/tls
  acme:
    domains: []
    email: ""
    staging: false
    cacheDir: /var/lib/ephpm/certs
  listen: "0.0.0.0:443"
  redirectHttp: false

# --- Document-root persistence (Deployment mode) -----------------------------
persistence:
  enabled: false
  existingClaim: ""
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/www/html

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: ephpm.example.com
      paths:
        - path: /
          pathType: Prefix
  certManager:
    enabled: true
    issuerKind: ClusterIssuer
    issuerName: letsencrypt-prod
  tls: []

livenessProbe:
  httpGet:
    path: /_ephpm/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /_ephpm/ready
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
startupProbe: {}

extraEnv: []
existingSecret: ""
extraEnvFrom: []

resources:
  limits:
    cpu: "1"
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
strategy: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0

podDisruptionBudget:
  enabled: false
  minAvailable: 1

extraVolumes: []
extraVolumeMounts: []
