# Default values for the ephpm chart.
# Every key here is overridable with `--set` or a custom values file.

# -- Number of replicas when running as a Deployment (cluster.enabled=false).
# Ignored when autoscaling.enabled=true or cluster.enabled=true.
replicaCount: 1

image:
  # -- Image repository. ePHPm is a *runtime*: bake your PHP app into an image
  # `FROM ephpm/ephpm` (app at /var/www/html) and point this at that image.
  # The default below serves only ePHPm's built-in demo docroot.
  repository: ephpm/ephpm
  # -- Image tag. Empty string defaults to the chart's appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# -- Secrets for pulling from a private registry (your baked app image).
imagePullSecrets: []
# - name: regcred

# -- Override the generated resource name prefix.
nameOverride: ""
fullnameOverride: ""

# -- TCP port the ePHPm HTTP listener binds inside the container.
# Must match `server.listen` in config.contents below.
containerPort: 8080

# Container entrypoint. The image's ENTRYPOINT is `tini --`; leaving command
# empty preserves tini as PID 1 and only overrides the CMD via args.
command: []
args:
  - "ephpm"
  - "serve"
  - "--config"
  - "/etc/ephpm/ephpm.toml"

# ---------------------------------------------------------------------------
# ePHPm configuration (rendered into a ConfigMap at /etc/ephpm/ephpm.toml).
#
# Note: ePHPm also reads env vars (prefix EPHPM_, `__` as the nesting
# separator, e.g. EPHPM_SERVER__LISTEN) and ENV OVERRIDES THE FILE. This chart
# sets operational env (metrics, clustering) from values below; everything
# else lives in this TOML. The db-proxy and KV/Redis listeners intentionally
# bind 127.0.0.1 (in-pod use by the co-located PHP) and are NOT exposed as
# Services — enable them here if your app uses them.
# ---------------------------------------------------------------------------
config:
  contents: |
    [server]
    listen = "0.0.0.0:8080"
    document_root = "/var/www/html"
    index_files = ["index.php", "index.html"]

    # Host-header validation. Empty = allow all (fine behind an Ingress).
    # [server.request]
    # trusted_hosts = ["example.com", "www.example.com"]

    # If TLS is terminated at the Ingress (the default for this chart), leave
    # ePHPm on plain HTTP and do NOT configure [server.tls] here.

    [php]
    mode = "embedded"
    max_execution_time = 30
    memory_limit = "128M"
    ini_overrides = [
        ["display_errors", "Off"],
        ["error_reporting", "E_ALL"],
    ]
  # -- Extra TOML appended verbatim after `contents` (e.g. [db.mysql], [kv]).
  extraToml: ""

# ---------------------------------------------------------------------------
# Clustering — switches the workload from Deployment to a StatefulSet that
# discovers peers over SWIM gossip via the headless Service DNS.
# ---------------------------------------------------------------------------
cluster:
  enabled: false
  replicas: 3
  # -- Gossip listen port (TCP + UDP). memberlist uses both.
  gossipPort: 7946
  # -- Logical cluster id. Empty defaults to the release fullname.
  clusterId: ""
  # -- Explicit seed list. Empty = auto-generate from headless Service DNS
  # for `replicas` pods (ephpm-0.<headless>..., ephpm-1...).
  join: []
  # -- Base64-encoded 32-byte key to encrypt gossip. Stored in a Secret and
  # injected as EPHPM_CLUSTER__SECRET. Empty = unencrypted gossip.
  secret: ""

# -- Kubernetes cluster DNS domain, used to build gossip seed FQDNs.
clusterDomain: cluster.local

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: ephpm.example.com
      paths:
        - path: /
          pathType: Prefix
  # cert-manager integration. With enabled=true the issuer annotation is added
  # automatically and a TLS secret name is derived per host (unless tls is set
  # explicitly below).
  certManager:
    enabled: true
    # "ClusterIssuer" or "Issuer"
    issuerKind: ClusterIssuer
    issuerName: letsencrypt-prod
  # Explicit TLS blocks. Leave empty to let certManager derive them per host.
  tls: []
  # - secretName: ephpm-tls
  #   hosts:
  #     - ephpm.example.com

# ---------------------------------------------------------------------------
# Metrics — Prometheus endpoint served on the SAME HTTP port at metrics.path.
# ---------------------------------------------------------------------------
metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    # Requires the Prometheus Operator CRDs.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# ---------------------------------------------------------------------------
# Probes — ePHPm's internal endpoints are served BEFORE host validation, so
# (unlike probing /index.php) they need no Host-header workaround.
#   /_ephpm/health -> liveness, always 200 while the process is up
#   /_ephpm/ready  -> readiness, 200 once the PHP runtime is initialized
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /_ephpm/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /_ephpm/ready
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
# Disabled by default; useful for slow PHP warmups.
startupProbe: {}

# -- Extra plain env vars (list of {name,value} or valueFrom).
extraEnv: []
# -- Sensitive env vars rendered into a Secret and mounted via envFrom
# (map of NAME: value), e.g. DB urls, KV passwords.
secretEnv: {}
# -- Name of a pre-existing Secret to load as envFrom.
existingSecret: ""
# -- Extra envFrom entries.
extraEnvFrom: []

resources:
  limits:
    cpu: "1"
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Pod- and container-level security. ePHPm's image runs as root by default;
# these defaults drop it to a non-root UID. 8080 (>1024) binds fine as non-root.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # PHP writes sessions to /tmp (mounted as an emptyDir below), so enabling a
  # read-only root filesystem is feasible — flip this after testing your app.
  readOnlyRootFilesystem: false

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# Deployment-only update strategy.
strategy: {}
#  type: RollingUpdate
#  rollingUpdate:
#    maxUnavailable: 0
#    maxSurge: 1

# Horizontal Pod Autoscaler (Deployment mode only; ignored when clustered).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Extra volumes/mounts (e.g. to mount app code instead of baking it in).
extraVolumes: []
extraVolumeMounts: []
