apiVersion: v2
name: ephpm
description: >-
  ePHPm — an all-in-one PHP application server with PHP embedded via FFI into a
  single static binary. Bundles an HTTP server, a connection-pooling database
  proxy, a KV store, and gossip-based clustering. This chart deploys ePHPm as a
  stateless Deployment by default, or as a gossip-clustered StatefulSet when
  cluster.enabled=true.
type: application

# Chart version. Bump on every change to the chart itself (SemVer).
version: 0.1.0

# Version of ePHPm this chart targets. Used as the default image tag.
appVersion: "0.1.0"

# Probe endpoints (/_ephpm/health, /_ephpm/ready) and the EPHPM_ env override
# scheme are stable on reasonably recent Kubernetes.
kubeVersion: ">=1.23.0-0"

home: https://ephpm.dev
icon: https://raw.githubusercontent.com/ephpm/ephpm/main/logo.svg
sources:
  - https://github.com/ephpm/ephpm
keywords:
  - php
  - web-server
  - application-server
  - frankenphp-alternative
  - kv
  - database-proxy
maintainers:
  - name: Anthony George
    email: cusegeorge2@gmail.com
