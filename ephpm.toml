[server]
listen = "0.0.0.0:8080"
document_root = "/var/www/html"
index_files = ["index.php", "index.html"]

# Fallback chain — checked in order, last entry is the fallback.
# Default: ["$uri", "$uri/", "/index.php?$query_string"]
# For static-only sites: ["$uri", "$uri/", "=404"]
# fallback = ["$uri", "$uri/", "/index.php?$query_string"]

# [server.request]
# max_body_size = 10485760  # bytes, 0 = unlimited. WordPress uploads may need 50 MiB.
# max_header_size = 8192    # bytes

# [server.timeouts]
# header_read = 30  # seconds to receive request headers
# idle = 60         # seconds before closing idle connections
# request = 300     # total request timeout (including PHP execution)

# [server.request]
# trusted_hosts = []       # Host header validation, e.g. ["example.com", "www.example.com"]
#                          # Returns 421 if Host doesn't match. Empty = allow all.

# [server.response]
# compression = true       # gzip for text responses
# compression_level = 1    # 1 = fast, 9 = best ratio
# compression_min_size = 1024  # minimum bytes to compress
# headers = []             # custom response headers applied to all responses
#                          # e.g. [["X-Frame-Options", "DENY"], ["Strict-Transport-Security", "max-age=63072000"]]

# [server.static]
# cache_control = ""       # Cache-Control header, e.g. "public, max-age=86400"
# hidden_files = "deny"    # "deny" (403), "ignore" (404), or "allow"
# etag = true              # ETag headers + 304 Not Modified support

# [server.php_etag_cache]
# enabled = false          # Cache PHP response ETags in KV store
# ttl_secs = 300           # seconds; -1 or 0 for indefinite (manual clearing required)
# key_prefix = "etag:"     # KV store key prefix for ETag entries

# [server.security]
# trusted_proxies = []     # CIDR ranges for X-Forwarded-For, e.g. ["10.0.0.0/8"]
# blocked_paths = []       # paths to block (403), e.g. ["/wp-config.php", "/vendor/*"]
# allowed_php_paths = []   # PHP execution allowlist, e.g. ["/index.php", "/wp-admin/*.php"]

# [server.logging]
# access = ""              # access log file path (empty = disabled)
# level = "info"           # trace, debug, info, warn, error

[php]
# mode = "embedded" (default) — PHP linked via FFI, zero overhead
# mode = "external" — spawn external PHP workers, use any PHP binary
mode = "embedded"
max_execution_time = 30
memory_limit = "128M"

# Optional: path to a custom php.ini file to load before ini_overrides.
# Useful for reusing an existing PHP configuration.
# Example: ini_file = "/etc/php.ini"
# Default: None (PHP searches standard locations or uses defaults)
# ini_file = "/etc/php.ini"

# INI directive overrides as [key, value] pairs.
# Applied AFTER ini_file (if specified), so these take precedence.
ini_overrides = [
    ["display_errors", "Off"],
    ["error_reporting", "E_ALL"],
]

# External mode settings (only used when mode = "external"):
# binary = "/usr/bin/php"         # path to PHP binary
# workers = 4                     # number of worker processes
# worker_script = "vendor/ephpm/worker.php"  # worker loop script

# [server.tls]
# --- Manual mode (provide your own cert/key) ---
# cert = "/etc/letsencrypt/live/example.com/fullchain.pem"
# key = "/etc/letsencrypt/live/example.com/privkey.pem"
#
# --- Auto mode (ACME / Let's Encrypt) ---
# domains = ["example.com", "www.example.com"]
# email = "admin@example.com"      # contact for expiry warnings
# cache_dir = "certs"              # where to store certs (default: "certs")
# staging = false                  # true = LE staging env (for testing)
#
# --- Shared options ---
# listen = "0.0.0.0:443"          # separate HTTPS port (omit to make server.listen HTTPS-only)
# redirect_http = true             # 301 redirect HTTP → HTTPS (requires tls.listen)

# ──────────────────────────────────────────────────────────
# Database Proxy & Connection Pooling (planned)
# ──────────────────────────────────────────────────────────
#
# ePHPm sits between PHP and your database, pooling connections
# so 200 PHP requests share 20 backend connections instead of
# each opening their own. PHP connects to 127.0.0.1:3306 (or
# the unix socket) — it doesn't know it's talking to a proxy.
#
# Configure your real database here. When inject_env = true,
# ePHPm auto-sets DB_HOST, DB_PORT, DATABASE_URL, etc. so
# Laravel/Symfony/WordPress pick up the proxy automatically.

# --- MySQL ---
#
# [db.mysql]
# url = "mysql://appuser:secret@db-primary:3306/myapp"
# listen = "127.0.0.1:3306"           # proxy listens here (PHP connects to this)
# socket = "/run/ephpm/mysql.sock"    # unix socket (faster, optional)
# min_connections = 5                  # keep at least this many backend connections open
# max_connections = 50                 # never open more than this to the real DB
# idle_timeout = "300s"                # close idle backend connections after this
# max_lifetime = "1800s"               # max age of a backend connection (prevents stale)
# pool_timeout = "5s"                  # how long PHP waits if all connections are busy
# health_check_interval = "30s"        # ping backend connections to detect failures
# inject_env = true                    # auto-set DB_HOST, DB_PORT, DATABASE_URL for PHP
# reset_strategy = "smart"             # smart (reset only if dirty), always, or never
#
# # Read replicas — SELECTs route here, writes go to primary
# [db.mysql.replicas]
# urls = [
#     "mysql://appuser:secret@db-replica-1:3306/myapp",
#     "mysql://appuser:secret@db-replica-2:3306/myapp",
# ]

# --- PostgreSQL ---
#
# [db.postgres]
# url = "postgres://appuser:secret@pg-primary:5432/myapp"
# listen = "127.0.0.1:5432"
# socket = "/run/ephpm/pgsql.sock"
# min_connections = 5
# max_connections = 30
# idle_timeout = "300s"
# max_lifetime = "1800s"
# pool_timeout = "5s"
# health_check_interval = "30s"
# inject_env = true
# reset_strategy = "smart"
#
# [db.postgres.replicas]
# urls = [
#     "postgres://appuser:secret@pg-replica-1:5432/myapp",
# ]

# --- Read/Write Splitting ---
#
# [db.read_write_split]
# enabled = false                      # requires replicas configured above
# strategy = "sticky-after-write"      # or "lag-aware"
# sticky_duration = "2s"               # after a write, reads stick to primary for this long
# max_replica_lag = "500ms"            # for lag-aware: skip replicas lagging more than this

# --- Query Analysis ---
#
# [db.analysis]
# slow_query_threshold = "100ms"       # queries slower than this are captured
# auto_explain = true                  # run EXPLAIN on slow queries
# auto_explain_target = "replica"      # don't hit primary with EXPLAINs
# digest_store_max_entries = 10000     # max unique query fingerprints to track

# ──────────────────────────────────────────────────────────
# KV Store
# ──────────────────────────────────────────────────────────
#
# [kv]
# memory_limit = "256MB"
# eviction_policy = "allkeys-lru"      # noeviction, allkeys-lru, volatile-lru, allkeys-random
# compression = "none"                 # "none", "gzip", "zstd" (brotli unsupported)
# compression_level = 6                # 1 = fastest, 9 = best ratio
# compression_min_size = 1024          # minimum bytes before compression is applied
#
# [kv.redis_compat]
# enabled = false                      # RESP protocol listener (existing Redis clients work)
# listen = "127.0.0.1:6379"           # TCP (zero-config for existing apps)
# socket = "/run/ephpm/redis.sock"    # Unix socket (faster, optional)

# ──────────────────────────────────────────────────────────
# Clustering (planned)
# ──────────────────────────────────────────────────────────
#
# [cluster]
# enabled = false
# bind = "0.0.0.0:7946"               # gossip listen address
# join = ["10.0.1.2:7946"]            # seed nodes (or k8s headless service DNS)
# secret = ""                          # base64-encoded 32-byte key (encrypts gossip)
#
# [cluster.kv]
# replication_factor = 2               # copies on N additional nodes
# replication_mode = "async"           # async or sync

# ──────────────────────────────────────────────────────────
# Observability (planned)
# ──────────────────────────────────────────────────────────
#
# [observability]
# admin_ui = true
# prometheus = true
#
# [observability.otlp_export]
# endpoint = "jaeger:4317"
# protocol = "grpc"
