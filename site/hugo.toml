baseURL = "https://ephpm.io/"
title = "ePHPm"
languageCode = "en-us"
theme = "hextra"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
hasCJKLanguage = false

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[params]
  description = "Embedded PHP application server in Rust — one binary from localhost to production."

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.theme]
    default = "light"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true

  [params.editURL]
    enable = true
    base = "https://github.com/ephpm/ephpm/edit/main/site/content"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  [params.toc]
    displayTags = true
    displayUpdatedDate = true

[[menu.main]]
  identifier = "docs"
  name = "Docs"
  pageRef = "/docs"
  weight = 1

[[menu.main]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/ephpm/ephpm"
  weight = 2
  [menu.main.params]
    icon = "github"
