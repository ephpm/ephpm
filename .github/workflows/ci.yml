name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout litewire (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ephpm/litewire
          path: litewire
          token: ${{ secrets.PHP_SDK_TOKEN }}
      - name: Symlink litewire for Cargo path dependency
        run: ln -sfn "$GITHUB_WORKSPACE/litewire" ../litewire
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout litewire (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ephpm/litewire
          path: litewire
          token: ${{ secrets.PHP_SDK_TOKEN }}
      - name: Symlink litewire for Cargo path dependency
        run: ln -sfn "$GITHUB_WORKSPACE/litewire" ../litewire
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libclang-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout litewire (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ephpm/litewire
          path: litewire
          token: ${{ secrets.PHP_SDK_TOKEN }}
      - name: Symlink litewire for Cargo path dependency
        run: ln -sfn "$GITHUB_WORKSPACE/litewire" ../litewire
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libclang-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  deny:
    name: Cargo Deny
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout litewire (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ephpm/litewire
          path: litewire
          token: ${{ secrets.PHP_SDK_TOKEN }}
      - name: Symlink litewire for Cargo path dependency
        run: ln -sfn "$GITHUB_WORKSPACE/litewire" ../litewire
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config libclang-dev libssl-dev
      - uses: EmbarkStudios/cargo-deny-action@v2
