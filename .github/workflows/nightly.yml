# Nightly test suite -- comprehensive builds and tests that are too slow for PR CI.
#
# Runs daily at 04:00 UTC and on manual dispatch. Covers full release builds
# across all supported PHP versions and architectures, plus the E2E test suite.
#
# Gating policy: the nightly's overall pass/fail signal is driven by the
# release-path Build jobs only (build-linux, build-macos, build-windows).
# Everything else -- the in-build `Run ignored integration tests` step, the
# fuzz / e2e / smoke-tests / audit jobs -- is "best-effort" with
# continue-on-error so individual failures don't mask the release signal.
# Failures still surface on the run page; only the summary check ignores them.
# Re-tighten by removing continue-on-error and re-adding the job to the
# nightly-summary fail gate.
#
# See docs/testing/nightly.md for the full nightly test plan.

name: Nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # -- 1. Full release builds ------------------------------------------------

  build-linux:
    name: Build (PHP ${{ matrix.php }}, linux-x86_64)
    runs-on: [self-hosted, linux, x64]
    container: ephpm/ephpm-ci:latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Build ephpm
        run: cargo xtask release ${{ matrix.php }}

      - name: Run ignored integration tests
        # Auxiliary -- does not gate the release path. Currently broken due to
        # a libphp+libxml2 link-order issue when building debug test binaries
        # (release builds dodge it via --gc-sections). Tracked as a separate
        # task; meanwhile keep running it so we can observe the error change.
        continue-on-error: true
        run: |
          PHP_SDK_PATH=$(find "$(pwd)/php-sdk" -mindepth 1 -maxdepth 1 -type d -name '*-linux-x86_64' | head -1)
          test -n "$PHP_SDK_PATH" || { echo "::error::PHP SDK not found"; exit 1; }
          PHP_SDK_PATH="$PHP_SDK_PATH" cargo nextest run \
            --target x86_64-unknown-linux-musl \
            --workspace --run-ignored ignored-only

      - name: Verify binary
        # cargo xtask release on Linux always targets musl (libphp.a is
        # musl-linked), so the artifact lives under the musl triple, not
        # the host triple.
        run: |
          FILE="target/x86_64-unknown-linux-musl/release/ephpm"
          test -f "$FILE" || { echo "::error::Binary not found at $FILE"; exit 1; }
          file "$FILE"
          ls -lh "$FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-php${{ matrix.php }}-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/ephpm

  build-macos:
    name: Build (PHP ${{ matrix.php }}, macos-aarch64)
    # Apple Silicon only -- the php-sdk release does not publish macos-x86_64.
    runs-on: [self-hosted, macos, arm64]
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Pin libclang for bindgen
        # The runner's system Apple-clang (Xcode 16+) emits CXCallingConv
        # value 20 (CXCallingConv_PreserveNone, added in clang 18), which
        # bindgen 0.72 doesn't know how to tokenize -- it panics with
        # "Cannot turn unknown calling convention to tokens: 20".
        # Pointing bindgen at llvm@17's libclang avoids the new enum value
        # entirely. Tracked at github.com/rust-lang/rust-bindgen -- remove
        # this step once bindgen learns the new CCs (or falls back
        # gracefully instead of panicking).
        #
        # /opt/homebrew/bin isn't on the runner's default PATH for
        # non-login shells, so prepend it before calling brew (same
        # pattern php-sdk's macOS job uses).
        #
        # BINDGEN_EXTRA_CLANG_ARGS pins clang's resource-dir to llvm@17's
        # bundled headers. Without this, libclang@17 ends up parsing
        # Apple-clang 21's NEON intrinsic headers (arm_neon.h /
        # arm_vector_types.h), which use __mfp8 -- a type added in
        # clang 19+ that llvm@17 doesn't know. The build then fails
        # with hundreds of "unknown type name '__mfp8'" /
        # "incompatible constant for this __builtin_neon function".
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          brew install llvm@17 || brew upgrade llvm@17 || true
          LLVM_PREFIX=$(brew --prefix llvm@17)
          # Find llvm@17's clang resource dir (varies by patch version)
          LLVM_RESOURCE_DIR=$(ls -d "${LLVM_PREFIX}"/lib/clang/* | head -1)
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=${LLVM_RESOURCE_DIR}" >> "$GITHUB_ENV"

      - name: Build ephpm
        # Pulls libphp.a from github.com/ephpm/php-sdk; no system PHP/spc
        # toolchain required.
        run: cargo xtask release ${{ matrix.php }}

      - name: Run ignored integration tests
        # Auxiliary -- does not gate the release path. See build-linux's
        # equivalent step for context.
        continue-on-error: true
        run: |
          cargo install cargo-nextest --locked || true
          PHP_SDK_PATH=$(find "$(pwd)/php-sdk" -mindepth 1 -maxdepth 1 -type d -name '*-macos-aarch64' | head -1)
          test -n "$PHP_SDK_PATH" || { echo "::error::PHP SDK not found"; exit 1; }
          PHP_SDK_PATH="$PHP_SDK_PATH" cargo nextest run --workspace --run-ignored ignored-only

      - name: Verify binary
        run: |
          FILE="target/aarch64-apple-darwin/release/ephpm"
          test -f "$FILE" || { echo "::error::Binary not found at $FILE"; exit 1; }
          file "$FILE"
          ls -lh "$FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-php${{ matrix.php }}-macos-aarch64
          path: target/aarch64-apple-darwin/release/ephpm

  build-windows:
    name: Build (PHP ${{ matrix.php }}, windows-x86_64)
    # Native Windows build on the self-hosted Windows runner (same fleet as
    # php-sdk). Replaces the previous cargo-xwin cross-compile-from-Linux
    # path, which kept hitting case-sensitivity / transitive-include gaps
    # between xwin's lowercased SDK headers and PHP source assumptions.
    runs-on: [self-hosted, windows, x64]
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          if (-not (Test-Path "$cargoBin\rustup.exe")) {
            Write-Host "Installing rustup..."
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            Remove-Item rustup-init.exe
          }
          # GITHUB_PATH applies to subsequent steps only; also update the
          # current step's PATH so the verification below can find rustup.
          $env:PATH = "$cargoBin;$env:PATH"
          $cargoBin | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          & "$cargoBin\rustup.exe" show

      - name: Install Visual Studio Build Tools
        shell: powershell
        # Mirrors php-sdk's install block (we share the same Windows
        # runner image: mcr.microsoft.com/windows/servercore:ltsc2025).
        # The runner is bare -- no compiler -- so each job installs VS
        # Build Tools fresh via the official bootstrapper. Bootstrapper
        # exit on Server Core is unreliable, so we poll for MSBuild.exe.
        # Long-term: ephemerd should bake VS Build Tools into the
        # Windows runner image; this step becomes a no-op fast-path.
        run: |
          $installPath = "C:\BuildTools"
          $msbuild = "$installPath\MSBuild\Current\Bin\MSBuild.exe"
          if (Test-Path $msbuild) {
            Write-Host "VS Build Tools already present at $installPath"
          } else {
            Write-Host "Downloading VS Build Tools bootstrapper..."
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile vs_buildtools.exe
            $proc = Start-Process -FilePath .\vs_buildtools.exe `
              -ArgumentList @(
                '--quiet', '--wait', '--norestart', '--nocache',
                '--installPath', $installPath,
                '--add', 'Microsoft.VisualStudio.Workload.VCTools',
                '--add', 'Microsoft.VisualStudio.Component.VC.Llvm.Clang',
                '--includeRecommended'
              ) -Wait -PassThru -NoNewWindow
            Write-Host "Bootstrapper exit code: $($proc.ExitCode)"
            Remove-Item vs_buildtools.exe
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            while (-not (Test-Path $msbuild) -and $sw.Elapsed.TotalMinutes -lt 20) {
              Start-Sleep -Seconds 30
              Write-Host ("  ...waiting for VS install ({0:F0}s)" -f $sw.Elapsed.TotalSeconds)
            }
            if (-not (Test-Path $msbuild)) {
              Write-Host "::error::VS install timed out - $msbuild never appeared"
              exit 1
            }
            Write-Host ("MSBuild.exe found after {0:F0}s" -f $sw.Elapsed.TotalSeconds)
          }

      - name: Enter MSVC developer environment
        shell: powershell
        # Source vcvars64.bat from our custom install path (C:\BuildTools)
        # and export the resulting env vars to GITHUB_ENV. ilammy/msvc-dev-cmd
        # only probes standard VS install paths and doesn't find our
        # Server Core-friendly C:\BuildTools install.
        #
        # PS 5.1 parser notes:
        #   - `&&` is rejected even inside quoted strings ("not a valid
        #     statement separator in this version"). Use `&` (single
        #     ampersand) -- cmd treats it as unconditional separator, PS
        #     parses it as literal inside a double-quoted string.
        #   - here-strings (@"..."@) require the closing "@ at column 0
        #     which fights YAML indentation; avoid them.
        run: |
          $vcvars = "C:\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            Write-Error "vcvars64.bat not found at $vcvars -- VS Build Tools install may have failed"
            exit 1
          }
          $envBefore = @{}
          foreach ($e in [Environment]::GetEnvironmentVariables().GetEnumerator()) {
            $envBefore[$e.Key] = $e.Value
          }
          $cmdLine = 'call "' + $vcvars + '" >NUL & set'
          $output = & cmd /c $cmdLine
          $count = 0
          foreach ($line in $output) {
            if ($line -match '^([^=]+)=(.*)$') {
              $name = $matches[1]
              $value = $matches[2]
              if ($envBefore[$name] -ne $value) {
                "$name=$value" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
                $count++
              }
            }
          }
          Write-Host "Forwarded $count env vars from vcvars64 to GITHUB_ENV"
          # bindgen needs libclang.dll; the VC.Llvm.Clang component added
          # to the VS Build Tools install puts it at this path. Set
          # LIBCLANG_PATH so bindgen's runtime libloading search finds it
          # without falling back to LLVM standard-locations probing.
          $libclangDir = "C:\BuildTools\VC\Tools\Llvm\x64\bin"
          if (Test-Path "$libclangDir\libclang.dll") {
            "LIBCLANG_PATH=$libclangDir" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            Write-Host "LIBCLANG_PATH set to $libclangDir"
          } else {
            Write-Warning "libclang.dll not found at $libclangDir -- bindgen may panic"
          }

      - name: Build ephpm.exe
        shell: powershell
        run: cargo xtask release ${{ matrix.php }} --target windows --no-sqld

      - name: Verify binary
        shell: powershell
        run: |
          $bin = "target\x86_64-pc-windows-msvc\release\ephpm.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Binary not found at $bin"
            exit 1
          }
          Get-Item $bin | Format-List Name, Length, LastWriteTime
          Write-Host "==> Linker metadata:"
          & dumpbin /headers $bin | Select-String -Pattern 'machine|subsystem'
          Write-Host "==> Linked DLL dependencies:"
          & dumpbin /dependents $bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-php${{ matrix.php }}-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/ephpm.exe

  # -- 2. Fuzz testing (4 targets in parallel) --------------------------------

  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: [self-hosted, linux, x64]
    # Run inside the CI image: `cargo install cargo-fuzz` and the fuzz
    # targets themselves need a C linker, and bare runners only ship rustup.
    container: ephpm/ephpm-ci:latest
    # Auxiliary -- does not gate the release path.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_resp_parser
          - fuzz_sql_normalizer
          - fuzz_mysql_classifier
          - fuzz_mysql_parse_stmt_id
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || true

      - name: Run fuzzer (5 minutes)
        run: |
          cd fuzz
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=300 -print_final_stats=1

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}

  # -- 3. E2E tests (using Linux build artifacts) ----------------------------

  e2e:
    name: E2E (PHP ${{ matrix.php }})
    needs: [build-linux]
    runs-on: [self-hosted, linux, x64]
    # Run inside the CI image so cargo has a C linker available
    # (xtask needs `cc` to compile; bare runners only ship rustup).
    # Same image as build-linux; ephemerd's host docker socket is
    # reachable from inside so the kind cluster inside xtask works.
    container: ephpm/ephpm-ci:latest
    # Auxiliary -- does not gate the release path.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install E2E tools (kind, tilt, kubectl)
        run: cargo xtask e2e-install

      - name: Run E2E tests
        run: cargo xtask e2e --php-version ${{ matrix.php }}

  # -- 4. App smoke tests (WordPress, Laravel, Symfony on litewire SQLite) --

  smoke-tests:
    name: Smoke Tests (PHP ${{ matrix.php }})
    needs: [build-linux]
    runs-on: [self-hosted, linux, x64]
    # Run inside the CI image: the bare runner has no `file` utility and
    # its docker CLI lacks the compose v2 plugin. The image ships both,
    # and ephemerd's host docker socket is reachable from inside.
    container: ephpm/ephpm-ci:latest
    # Auxiliary -- does not gate the release path.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Download ephpm binary
        uses: actions/download-artifact@v4
        with:
          name: ephpm-php${{ matrix.php }}-linux-x86_64
          path: artifact

      - name: Prepare binary
        run: |
          # The artifact contains target/<triple>/release/ephpm -- find and flatten it
          BINARY=$(find artifact -name ephpm -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "::error::ephpm binary not found in artifact"
            ls -laR artifact
            exit 1
          fi
          mkdir -p target
          cp "$BINARY" target/ephpm
          chmod +x target/ephpm
          file target/ephpm
          echo "EPHPM_BINARY=./target/ephpm" >> "$GITHUB_ENV"

      - name: Make scripts executable
        run: chmod +x tests/smoke/*.sh

      - name: Start smoke test containers
        run: |
          docker compose -f docker/docker-compose.smoke.yml up -d
          echo "==> Waiting for containers to initialize..."
          # Give containers time to download dependencies and set up apps
          sleep 30

      - name: Wait for containers healthy
        timeout-minutes: 10
        run: |
          for svc in wordpress laravel symfony; do
            echo "==> Waiting for ${svc}..."
            timeout 300 bash -c "
              until docker compose -f docker/docker-compose.smoke.yml ps ${svc} \
                | grep -q healthy; do
                sleep 5
              done
            " || {
              echo "::warning::${svc} did not become healthy in time"
              docker compose -f docker/docker-compose.smoke.yml logs ${svc} | tail -100
            }
          done

      - name: Run WordPress smoke tests
        if: always()
        run: bash tests/smoke/wp-smoke.sh

      - name: Run Laravel smoke tests
        if: always()
        run: bash tests/smoke/laravel-smoke.sh

      - name: Run Symfony smoke tests
        if: always()
        run: bash tests/smoke/symfony-smoke.sh

      - name: Collect container logs
        if: failure()
        run: |
          mkdir -p smoke-logs
          for svc in wordpress laravel symfony; do
            docker compose -f docker/docker-compose.smoke.yml logs ${svc} \
              > "smoke-logs/${svc}.log" 2>&1 || true
          done

      - name: Upload smoke test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-php${{ matrix.php }}
          path: smoke-logs/

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.smoke.yml down -v

  # -- 5. Dependency audit --------------------------------------------------

  audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, x64]
    # Run inside the CI image so cargo-audit/cargo-outdated can compile
    # (they need a C linker; bare runners only ship rustup).
    container: ephpm/ephpm-ci:latest
    # Auxiliary -- does not gate the release path.
    continue-on-error: true
    env:
      # Prebuilt musl binary -- avoids both compiling cargo-deny from
      # source and the Docker-based cargo-deny-action, whose buildx path
      # needs --privileged (disabled by the ephemerd runner).
      CARGO_DENY_VERSION: 0.19.8
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo deny
        # cargo-deny's `advisories` check reads the same RustSec database
        # cargo-audit does, but honors the single canonical ignore list in
        # deny.toml (advisories triaged as not-reachable / compile-time-only /
        # blocked upstream). A separate `cargo audit` step was removed because
        # it does NOT read deny.toml, so it re-reported every ignored advisory
        # and the two tools drifted. cargo-deny `check` covers advisories +
        # bans + licenses + sources in one pass — the single advisory gate.
        run: |
          curl -fsSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
          cargo-deny --version
          cargo-deny check

      - name: cargo outdated (informational)
        continue-on-error: true
        run: |
          cargo install cargo-outdated --locked || true
          echo "## Outdated Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo outdated --root-deps-only 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # -- Summary ---------------------------------------------------------------

  nightly-summary:
    name: Nightly Summary
    if: always()
    needs: [build-linux, build-macos, build-windows, fuzz, e2e, smoke-tests, audit]
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check results
        run: |
          echo "## Nightly Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Linux builds | ${{ needs.build-linux.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| macOS builds | ${{ needs.build-macos.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows builds | ${{ needs.build-windows.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fuzz testing | ${{ needs.fuzz.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E tests | ${{ needs.e2e.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke tests | ${{ needs.smoke-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency audit | ${{ needs.audit.result }} |" >> "$GITHUB_STEP_SUMMARY"

          # Gate only on the release-path Build jobs. Fuzz, E2E, Smoke, and
          # Audit are marked continue-on-error and are tracked separately;
          # their failures show on the run page but don't fail the nightly.
          if [[ "${{ needs.build-linux.result }}" == "failure" ]] || \
             [[ "${{ needs.build-macos.result }}" == "failure" ]] || \
             [[ "${{ needs.build-windows.result }}" == "failure" ]]; then
            echo "::error::One or more release-path Build jobs failed"
            exit 1
          fi
