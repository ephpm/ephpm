name: Release

# Release artifacts produced per tag:
#
#   * Per-platform binary archives uploaded to the GitHub release:
#       ephpm-vX.Y.Z+php<PHP_FULL>-<os>-<arch>.tar.gz   (one per PHP minor x OS/arch)
#       SHA256SUMS                                       (covers all archives)
#
#   * Docker images pushed to Docker Hub at docker.io/ephpm/ephpm:
#       :vX.Y.Z-php<PHP_FULL>     pinned ephpm release x pinned PHP patch
#       :vX.Y.Z-php<PHP_MINOR>    pinned ephpm release x rolling PHP minor
#       :<PHP_MINOR>              rolling latest release x rolling PHP minor
#       :vX.Y.Z (default PHP)     pinned ephpm release x default PHP minor
#       :latest (default PHP)     rolling latest release x default PHP minor
#
# The "+" in artifact names is real SemVer build metadata. OCI tag regex
# rejects "+", so every Docker tag substitutes "-" for "+" -- the same
# trade-off k3s and rke2 make. The real SemVer string is preserved on each
# image via the org.opencontainers.image.version label.
#
# PHP version pins must match xtask::PHP_SDK_VERSIONS -- keep the matrix
# entries below in sync if you bump a pin.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -- Linux x86_64 binaries ---------------------------------------------------
  # arm64 lives in its own job (build-linux-arm64) so it can be throttled
  # independently: the v0.5.1 release run proved that firing every leg at
  # once kills the shared hosts (all 9 non-x64 legs died mid-build with
  # "runner lost communication" / vanished-disk signatures) while the x64
  # pool handled 3 builds + 3 Docker jobs fine.
  build-linux:
    name: Build (PHP ${{ matrix.php.full }}, ${{ matrix.arch.sdk }})
    runs-on: [self-hosted, linux, x64]
    container: "ephpm/ephpm-ci:${{ matrix.arch.image }}"
    strategy:
      fail-fast: false
      matrix:
        php:
          - { minor: "8.3", full: "8.3.31" }
          - { minor: "8.4", full: "8.4.23" }
          - { minor: "8.5", full: "8.5.7" }
        arch:
          - runner: x64
            image: latest
            triple: x86_64-unknown-linux-gnu
            sdk: linux-x86_64
            lto: fat
    steps:
      - uses: actions/checkout@v4

      - name: Compute release version
        # Strip the leading "v" from the git ref name so EPHPM_RELEASE_VERSION
        # is a bare SemVer string ("v0.1.1" -> "0.1.1") matching clap's
        # default `<bin> <version>` formatting. crates/ephpm/build.rs forwards
        # this into the binary so `ephpm --version` reports the actual tag
        # instead of the frozen workspace version in Cargo.toml.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          echo "EPHPM_RELEASE_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build ephpm
        env:
          # Overrides profile.release.lto from Cargo.toml per-arch (see the
          # matrix `lto` values — arm64 must use thin to fit in host memory).
          CARGO_PROFILE_RELEASE_LTO: ${{ matrix.arch.lto }}
        run: cargo xtask release ${{ matrix.php.minor }}

      - name: Package archive
        id: pkg
        env:
          VERSION: ${{ github.ref_name }}
          PHP_FULL: ${{ matrix.php.full }}
        run: |
          set -eu
          name="ephpm-${VERSION}+php${PHP_FULL}-${{ matrix.arch.sdk }}"
          mkdir -p "dist/${name}"
          # cargo xtask release targets the gnu triple explicitly on Linux
          # (glibc-dynamic binary, dlopen-capable), so the binary lives under
          # target/<triple>/release/, not target/release/.
          cp "target/${{ matrix.arch.triple }}/release/ephpm" "dist/${name}/ephpm"
          cp LICENSE "dist/${name}/LICENSE"
          cp .github/release-readme.txt "dist/${name}/README.txt"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          rm -rf "dist/${name}"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-${{ github.ref_name }}-php${{ matrix.php.full }}-${{ matrix.arch.sdk }}
          path: ${{ steps.pkg.outputs.archive }}

  # -- Linux arm64 binaries ----------------------------------------------------
  build-linux-arm64:
    name: Build (PHP ${{ matrix.php.full }}, linux-aarch64)
    # arm64 builds run in the Apple Silicon host's embedded linux VM
    # (ephemerd dispatches `[self-hosted, linux, arm64]`) — the SAME
    # physical machine that runs build-macos natively. `needs: build-macos`
    # is the only cross-job serialization GitHub offers, and max-parallel: 1
    # keeps the VM to one heavy link at a time. Without both, the v0.5.1
    # release run put 6 concurrent release builds on that one host and every
    # runner on it died mid-build.
    needs: build-macos
    runs-on: [self-hosted, linux, arm64]
    container: "ephpm/ephpm-ci:latest-arm64"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        php:
          - { minor: "8.3", full: "8.3.31" }
          - { minor: "8.4", full: "8.4.23" }
          - { minor: "8.5", full: "8.5.7" }
    steps:
      - uses: actions/checkout@v4

      - name: Compute release version
        # See build-linux for rationale; strips leading "v" from the git ref.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          echo "EPHPM_RELEASE_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build ephpm
        env:
          # Thin LTO on arm64: the fat-LTO final link of the ephpm binary
          # (libphp.a + ICU + everything, codegen-units=1) exceeds the
          # arm64 build host's memory — rustc gets SIGKILLed by the OOM
          # killer even running as the only job. Thin LTO cuts link-time
          # memory to a fraction for a ~1% perf delta on a target where
          # we publish no benchmark numbers anyway.
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo xtask release ${{ matrix.php.minor }}

      - name: Package archive
        id: pkg
        env:
          VERSION: ${{ github.ref_name }}
          PHP_FULL: ${{ matrix.php.full }}
        run: |
          set -eu
          name="ephpm-${VERSION}+php${PHP_FULL}-linux-aarch64"
          mkdir -p "dist/${name}"
          # cargo xtask release targets the gnu triple explicitly on Linux
          # (glibc-dynamic binary, dlopen-capable), so the binary lives under
          # target/<triple>/release/, not target/release/.
          cp "target/aarch64-unknown-linux-gnu/release/ephpm" "dist/${name}/ephpm"
          cp LICENSE "dist/${name}/LICENSE"
          cp .github/release-readme.txt "dist/${name}/README.txt"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          rm -rf "dist/${name}"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-${{ github.ref_name }}-php${{ matrix.php.full }}-linux-aarch64
          path: ${{ steps.pkg.outputs.archive }}

  # -- macOS binaries ---------------------------------------------------------
  build-macos:
    name: Build (PHP ${{ matrix.php_full }}, macos-aarch64)
    runs-on: [self-hosted, macos, arm64]
    strategy:
      fail-fast: false
      # One fat-LTO release build at a time on the Apple Silicon host — it
      # also hosts the linux-arm64 build VM (see build-linux-arm64). Raise
      # to 2 only after a release proves real headroom.
      max-parallel: 1
      matrix:
        include:
          - php_minor: "8.3"
            php_full: "8.3.31"
          - php_minor: "8.4"
            php_full: "8.4.23"
          - php_minor: "8.5"
            php_full: "8.5.7"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Compute release version
        # See build-linux for rationale; strips leading "v" from the git ref.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          echo "EPHPM_RELEASE_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pin libclang for bindgen
        # Pin libclang to brew llvm@17 to dodge the bindgen
        # CXCallingConv-20 panic; also pin the clang resource-dir so
        # bindgen uses llvm@17's NEON headers instead of Apple-clang
        # 21's (which use the newer __mfp8 type). Mirrors nightly.yml.
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          brew install llvm@17 || brew upgrade llvm@17 || true
          LLVM_PREFIX=$(brew --prefix llvm@17)
          LLVM_RESOURCE_DIR=$(ls -d "${LLVM_PREFIX}"/lib/clang/* | head -1)
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=${LLVM_RESOURCE_DIR}" >> "$GITHUB_ENV"

      - name: Build ephpm
        env:
          # PHP SDK 8.5.7 macOS objects are built with a newer Xcode that
          # emits calls to `___isPlatformVersionAtLeast` (macOS 12+ runtime
          # helper). The linker infers deployment target from the .rlib
          # objects and complains at 11.0. Setting the floor to 12.0 (Apple
          # dropped support for anything older) resolves it and matches the
          # SDK's build environment. 8.3/8.4 SDKs also link cleanly at 12.0.
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: cargo xtask release ${{ matrix.php_minor }}

      - name: Package archive
        id: pkg
        env:
          VERSION: ${{ github.ref_name }}
          PHP_FULL: ${{ matrix.php_full }}
        run: |
          set -eu
          name="ephpm-${VERSION}+php${PHP_FULL}-macos-aarch64"
          mkdir -p "dist/${name}"
          # xtask release targets aarch64-apple-darwin, not target/release/.
          cp target/aarch64-apple-darwin/release/ephpm "dist/${name}/ephpm"
          cp LICENSE "dist/${name}/LICENSE"
          cp .github/release-readme.txt "dist/${name}/README.txt"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          rm -rf "dist/${name}"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-${{ github.ref_name }}-php${{ matrix.php_full }}-macos-aarch64
          path: ${{ steps.pkg.outputs.archive }}

  # -- Windows binaries (native on self-hosted Windows runner) --------------
  build-windows:
    name: Build (PHP ${{ matrix.php_full }}, windows-x86_64)
    runs-on: [self-hosted, windows, x64]
    strategy:
      fail-fast: false
      # One release build per Windows worker at a time: the v0.5.1 run's 3
      # concurrent legs took the pool down mid-build (work-dir device
      # vanished under the runner). Loosen only with proven headroom.
      max-parallel: 1
      matrix:
        include:
          - php_minor: "8.3"
            php_full: "8.3.31"
          - php_minor: "8.4"
            php_full: "8.4.23"
          - php_minor: "8.5"
            php_full: "8.5.7"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          if (-not (Test-Path "$cargoBin\rustup.exe")) {
            Write-Host "Installing rustup..."
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            Remove-Item rustup-init.exe
          }
          $env:PATH = "$cargoBin;$env:PATH"
          $cargoBin | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          & "$cargoBin\rustup.exe" show

      - name: Install Visual Studio Build Tools
        shell: powershell
        # Mirrors php-sdk's install block; runner image is bare so each
        # job installs VS Build Tools fresh via the official bootstrapper.
        run: |
          $installPath = "C:\BuildTools"
          $msbuild = "$installPath\MSBuild\Current\Bin\MSBuild.exe"
          if (Test-Path $msbuild) {
            Write-Host "VS Build Tools already present at $installPath"
          } else {
            Write-Host "Downloading VS Build Tools bootstrapper..."
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile vs_buildtools.exe
            $proc = Start-Process -FilePath .\vs_buildtools.exe `
              -ArgumentList @(
                '--quiet', '--wait', '--norestart', '--nocache',
                '--installPath', $installPath,
                '--add', 'Microsoft.VisualStudio.Workload.VCTools',
                '--add', 'Microsoft.VisualStudio.Component.VC.Llvm.Clang',
                '--includeRecommended'
              ) -Wait -PassThru -NoNewWindow
            Write-Host "Bootstrapper exit code: $($proc.ExitCode)"
            Remove-Item vs_buildtools.exe
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            while (-not (Test-Path $msbuild) -and $sw.Elapsed.TotalMinutes -lt 20) {
              Start-Sleep -Seconds 30
              Write-Host ("  ...waiting for VS install ({0:F0}s)" -f $sw.Elapsed.TotalSeconds)
            }
            if (-not (Test-Path $msbuild)) {
              Write-Host "::error::VS install timed out - $msbuild never appeared"
              exit 1
            }
            Write-Host ("MSBuild.exe found after {0:F0}s" -f $sw.Elapsed.TotalSeconds)
          }

      - name: Enter MSVC developer environment
        shell: powershell
        run: |
          $vcvars = "C:\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) { Write-Error "vcvars64.bat not found"; exit 1 }
          $envBefore = @{}
          foreach ($e in [Environment]::GetEnvironmentVariables().GetEnumerator()) {
            $envBefore[$e.Key] = $e.Value
          }
          $cmdLine = 'call "' + $vcvars + '" >NUL & set'
          $output = & cmd /c $cmdLine
          foreach ($line in $output) {
            if ($line -match '^([^=]+)=(.*)$') {
              if ($envBefore[$matches[1]] -ne $matches[2]) {
                "$($matches[1])=$($matches[2])" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
              }
            }
          }
          $libclangDir = "C:\BuildTools\VC\Tools\Llvm\x64\bin"
          if (Test-Path "$libclangDir\libclang.dll") {
            "LIBCLANG_PATH=$libclangDir" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          } else {
            Write-Warning "libclang.dll not found at $libclangDir -- bindgen may panic"
          }

      - name: Compute release version
        # See build-linux for rationale; strips leading "v" from the git ref.
        shell: powershell
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME -replace '^v',''
          "EPHPM_RELEASE_VERSION=$version" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build ephpm.exe
        shell: powershell
        env:
          # Thin LTO on Windows: the fat-LTO final link (libphp static lib +
          # everything, codegen-units=1) OOMs rustc-LLVM on the ephemerd
          # worker VMs ("rustc-LLVM ERROR: out of memory", v0.5.1 run).
          # Same trade as linux-aarch64 (#181): ~1% perf delta on a target
          # with no published benchmark numbers.
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo xtask release ${{ matrix.php_minor }} --target windows --no-sqld

      - name: Package archive
        id: pkg
        shell: powershell
        env:
          VERSION: ${{ github.ref_name }}
          PHP_FULL: ${{ matrix.php_full }}
        run: |
          $name = "ephpm-$env:VERSION+php$env:PHP_FULL-windows-x86_64"
          $stage = "dist\$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\ephpm.exe "$stage\ephpm.exe"
          Copy-Item LICENSE "$stage\LICENSE"
          Copy-Item .github\release-readme.txt "$stage\README.txt"
          # tar.gz on Windows: built-in `tar` (bsdtar) on Win10/11 1809+
          # produces a portable archive consumers can `tar xzf` cross-OS.
          tar -C dist -czf "dist\$name.tar.gz" $name
          Remove-Item -Recurse -Force $stage
          "archive=dist/$name.tar.gz" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ephpm-${{ github.ref_name }}-php${{ matrix.php_full }}-windows-x86_64
          path: ${{ steps.pkg.outputs.archive }}

  # -- Docker images on Docker Hub --------------------------------------------
  docker-image:
    name: Docker (PHP ${{ matrix.php_full }})
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_minor: "8.3"
            php_full: "8.3.31"
          - php_minor: "8.4"
            php_full: "8.4.23"
            default: false
          - php_minor: "8.5"
            php_full: "8.5.7"
            default: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ github.ref_name }}
          PHP_MINOR: ${{ matrix.php_minor }}
          PHP_FULL: ${{ matrix.php_full }}
          IS_DEFAULT: ${{ matrix.default }}
        run: |
          set -eu
          # Strip leading "v" so EPHPM_RELEASE_VERSION matches clap formatting
          # ("v0.1.1" -> "0.1.1"). Forwarded to the Docker builder as a
          # build-arg so the in-container `cargo xtask release` reports the
          # tag via `ephpm --version`. See crates/ephpm/build.rs.
          echo "release_version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          # All tags substitute "+" -> "-" because OCI tag regex rejects "+".
          # The real SemVer string lives in the OCI label (see --label below).
          # Pre-release tags (e.g. v0.1.0-rc.1, detected by the "-") must not
          # move the rolling tags (:latest, :<minor>); those track stable
          # releases only.
          case "${VERSION}" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac
          tags="ephpm/ephpm:${VERSION}-php${PHP_FULL}"
          tags="${tags},ephpm/ephpm:${VERSION}-php${PHP_MINOR}"
          if [ "${prerelease}" = "false" ]; then
            tags="${tags},ephpm/ephpm:${PHP_MINOR}"
          fi
          if [ "${IS_DEFAULT}" = "true" ]; then
            tags="${tags},ephpm/ephpm:${VERSION}"
            if [ "${prerelease}" = "false" ]; then
              tags="${tags},ephpm/ephpm:latest"
            fi
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION}+php${PHP_FULL}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          # Don't upload the ".dockerbuild" build-record artifact. We never
          # consume it, and it inflates the Create Release download to 15
          # artifacts, adding parallel connections that the self-hosted
          # runner's egress to Azure blob storage can't all sustain.
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            PHP_SDK_VERSION=${{ matrix.php_full }}
            EPHPM_RELEASE_VERSION=${{ steps.tags.outputs.release_version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ephpm
            org.opencontainers.image.description=All-in-one PHP application server in a single binary
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.semver }}
            org.opencontainers.image.licenses=MIT

  # -- Release: gather archives, hash them, attach to the GitHub release ------
  release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-macos, build-windows, docker-image]
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
    steps:
      # Download in two batches of 6 (by arch suffix) rather than all at once.
      # actions/download-artifact@v4 fetches every matched artifact in
      # parallel; downloading all 12 together saturated the self-hosted
      # runner's egress to Azure blob storage and silently dropped the tail
      # (it aborts after 5 internal retries). Two 6-way batches stay well
      # under that ceiling. merge-multiple flattens archives into ./artifacts.
      # (gh CLI is not installed on this runner, so a gh-based loop is out.)
      - name: Download x86_64 archives
        uses: actions/download-artifact@v4
        with:
          pattern: ephpm-v*-x86_64
          path: artifacts
          merge-multiple: true

      - name: Download aarch64 archives
        uses: actions/download-artifact@v4
        with:
          pattern: ephpm-v*-aarch64
          path: artifacts
          merge-multiple: true

      - name: Collect archives and write SHA256SUMS
        id: collect
        run: |
          set -eu
          mkdir -p release
          # merge-multiple put every archive flat under artifacts/; gather
          # them so SHA256SUMS lives next to the things it sums.
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          (cd release && sha256sum *.tar.gz | sort > SHA256SUMS)
          echo "Collected $(ls release/*.tar.gz | wc -l) archives:"
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # SemVer pre-release tags carry a "-" (e.g. v0.1.0-rc.1, v0.2.0-beta.2).
          # Mark them prerelease so GitHub does not promote them to "Latest"
          # and demote the actual stable release in the Releases UI.
          prerelease: ${{ contains(github.ref_name, '-') }}
