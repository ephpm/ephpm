# E2E tests — build ephpm with PHP, deploy to Kind, run phpinfo validation.
#
# Matrix: PHP 8.4 and 8.5. Each job builds a release binary with the
# specified PHP version and asserts that the running server reports it.

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize E2E across the whole repo. Each E2E job runs a full Kind cluster
# plus a Rust release build inside ephemerd's shared 16 GB Linux VM; several
# E2E runs overlapping (different PRs / push-to-main / re-pushes) saturate it
# and the Kind apiserver gets starved mid-run ("connection reset by peer" ->
# 30m Tilt timeout). `max-parallel: 1` already serializes the matrix legs
# within a single run; this group serializes runs against each other so only
# one E2E run is ever on the box at a time. cancel-in-progress: false because
# we want queued runs to wait their turn, not be discarded.
concurrency:
  group: ephpm-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E (PHP ${{ matrix.php }})
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        php: ["8.3", "8.5", "8.4"]

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential libclang-dev
      - uses: dtolnay/rust-toolchain@stable

      - name: Install E2E tools (kind, tilt, kubectl)
        run: cargo xtask e2e-install

      - name: Run E2E tests
        run: cargo xtask e2e --php-version ${{ matrix.php }}
