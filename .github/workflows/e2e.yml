# E2E tests - bare-process default.
#
# Spawns ephpm binaries directly on 127.0.0.1 (no Kind, no Tilt, no
# `--privileged` DinD in the CI path) and runs the ephpm-e2e test binaries
# against them. Matrix: PHP 8.3, 8.4, 8.5. See `xtask/src/e2e_bare.rs`.
#
# The old Kind + Tilt harness lives at .github/workflows/k8s-e2e.yml as an
# opt-in workflow_dispatch job for engineers who want to smoke K8s deploy
# shape before checking in code that touches k8s/.

name: E2E Tests

# Docs-only changes skip E2E (unchanged from the Kind era).
on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"

# NOTE: no `concurrency` group. Bare-process runs are independent - each job
# spawns ephpm processes on high, per-run loopback ports and cleans up on exit.
# Multiple E2E runs can share the runner without stepping on each other, and
# the matrix legs can run in parallel.

jobs:
  e2e-bare:
    name: E2E bare-process (PHP ${{ matrix.php }})
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.5", "8.4"]

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential libclang-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable

      - name: Run bare-process E2E
        run: cargo xtask e2e --php-version ${{ matrix.php }}
