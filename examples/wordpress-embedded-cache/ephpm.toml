[server]
listen        = "0.0.0.0:8080"
document_root = "/app/wordpress"

# External MySQL via ePHPm's connection-pooling proxy (WordPress's pdo_mysql
# connects to 127.0.0.1:3306 here, forwarded to the mysql container).
[db.mysql]
url            = "mysql://wordpress:wordpress@mysql:3306/wordpress"
listen         = "127.0.0.1:3306"
reset_strategy = "always"

# NOTE: there is intentionally no [kv.redis_compat] section. The object cache
# is the ephpm/cache-wordpress drop-in, which calls the ephpm_kv_* SAPI
# functions in-process — no RESP listener, no socket, no Redis container.
