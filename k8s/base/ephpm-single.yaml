# Single ephpm instance for E2E testing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ephpm
  labels:
    app: ephpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ephpm
  template:
    metadata:
      labels:
        app: ephpm
    spec:
      containers:
        - name: ephpm
          image: ephpm:dev
          env:
            - name: EPHPM_SERVER__METRICS__ENABLED
              value: "true"
            - name: EPHPM_SERVER__PHP_ETAG_CACHE__ENABLED
              value: "true"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /index.php
              port: 8080
              # Match a trusted_hosts entry so the probe doesn't 421.
              # The kubelet otherwise sends Host: <pod-ip>, which is rejected.
              httpHeaders:
                - name: Host
                  value: ephpm
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm
spec:
  selector:
    app: ephpm
  ports:
    - port: 8080
      targetPort: 8080
