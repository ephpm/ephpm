# Single ephpm instance for E2E testing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ephpm
  labels:
    app: ephpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ephpm
  template:
    metadata:
      labels:
        app: ephpm
    spec:
      containers:
        - name: ephpm
          image: ephpm:dev
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /index.php
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm
spec:
  selector:
    app: ephpm
  ports:
    - port: 8080
      targetPort: 8080
