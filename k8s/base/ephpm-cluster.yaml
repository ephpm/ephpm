# 3-node ephpm StatefulSet for cluster E2E testing.
#
# Enables gossip-based SWIM clustering with all pods discovering each other
# via the headless service DNS. Each pod gets a stable hostname:
#   ephpm-cluster-0, ephpm-cluster-1, ephpm-cluster-2
#
# Individual per-pod services allow tests to target specific nodes.
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm-cluster-headless
  labels:
    app: ephpm-cluster
spec:
  clusterIP: None
  selector:
    app: ephpm-cluster
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: gossip
      port: 7946
      targetPort: 7946
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm-cluster
  labels:
    app: ephpm-cluster
spec:
  selector:
    app: ephpm-cluster
  ports:
    - port: 8080
      targetPort: 8080
---
# Per-pod services so tests can address individual nodes.
apiVersion: v1
kind: Service
metadata:
  name: ephpm-cluster-0
spec:
  selector:
    statefulset.kubernetes.io/pod-name: ephpm-cluster-0
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm-cluster-1
spec:
  selector:
    statefulset.kubernetes.io/pod-name: ephpm-cluster-1
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm-cluster-2
spec:
  selector:
    statefulset.kubernetes.io/pod-name: ephpm-cluster-2
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ephpm-cluster
  labels:
    app: ephpm-cluster
spec:
  serviceName: ephpm-cluster-headless
  replicas: 3
  selector:
    matchLabels:
      app: ephpm-cluster
  template:
    metadata:
      labels:
        app: ephpm-cluster
    spec:
      containers:
        - name: ephpm
          image: ephpm:dev
          env:
            - name: EPHPM_CLUSTER__ENABLED
              value: "true"
            - name: EPHPM_CLUSTER__BIND
              value: "0.0.0.0:7946"
            - name: EPHPM_CLUSTER__CLUSTER_ID
              value: "e2e-cluster"
            - name: EPHPM_CLUSTER__JOIN
              value: '["ephpm-cluster-0.ephpm-cluster-headless:7946","ephpm-cluster-1.ephpm-cluster-headless:7946","ephpm-cluster-2.ephpm-cluster-headless:7946"]'
            - name: EPHPM_SERVER__METRICS__ENABLED
              value: "true"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 7946
              name: gossip
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /index.php
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
